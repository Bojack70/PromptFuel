name: Max Weekly Brain

on:
  schedule:
    - cron: '0 7 * * 1'  # Monday 07:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write          # Needed to commit data

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Max
        run: pnpm --filter @promptfuel/max build

      - name: Run weekly brain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: Bojack70
          GITHUB_REPO: PromptFuel
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          DUB_API_KEY: ${{ secrets.DUB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          MAX_DATA_DIR: packages/max/data
        run: node packages/max/dist/index.js --mode weekly

      - name: Generate dashboard
        env:
          MAX_DATA_DIR: packages/max/data
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: Bojack70
          GITHUB_REPO: PromptFuel
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node packages/max/dist/index.js --mode dashboard

      - name: Commit data
        run: |
          git config user.name "Max Agent"
          git config user.email "max@promptfuel.dev"
          git add packages/max/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: weekly brain $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/max/data/dashboard
          publish_branch: gh-pages
          commit_message: "dashboard: deploy $(date -u +%Y-%m-%d)"
