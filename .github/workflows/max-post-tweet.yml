name: Max Post Tweet

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: 'Tweet text (max 280 chars)'
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Max
        run: pnpm --filter @promptfuel/max build

      - name: Post tweet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: Bojack70
          GITHUB_REPO: PromptFuel
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TWEET_TEXT: ${{ inputs.tweet_text }}
          MAX_DATA_DIR: packages/max/data
        run: node packages/max/dist/index.js --mode post-tweet

      - name: Commit content log
        run: |
          git config user.name "Max Agent"
          git config user.email "max@promptfuel.dev"
          git add packages/max/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: manual tweet $(date -u +%Y-%m-%d)"
            git push
          fi
